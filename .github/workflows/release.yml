name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # Apple Silicon only for now. GitHub's Intel (macos-13) runners are being
    # phased out and queue unreliably, and Bun can't cross-link OpenTUI's
    # foreign-platform native dep. An Intel build can be added later on a
    # dedicated runner if there's demand — until then x64 users build from source.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run scripts/build.ts dist/mox-darwin-arm64
      - run: chmod +x dist/mox-darwin-arm64
      - name: Checksums
        run: |
          cd dist
          shasum -a 256 mox-darwin-arm64 > checksums.txt
          cat checksums.txt

      # Build the release body from CHANGELOG.md (the single source of truth):
      # the section for this tag's version, then the static install footer.
      # generate_release_notes appends GitHub's "Full Changelog" compare link.
      - name: Release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Print the lines under "## [VERSION]", stopping at the next version
          # header OR the link-reference block at the bottom of the file — i.e.
          # just this version's entries.
          awk -v v="## [$VERSION]" '
            index($0, v) == 1 { grab = 1; next }
            grab && (/^## \[/ || /^\[[^]]*\]: /) { exit }
            grab { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          cat .github/release-footer.md >> /tmp/release-notes.md
          echo "----- release notes -----"; cat /tmp/release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mox-darwin-arm64
            dist/checksums.txt
          generate_release_notes: true
          body_path: /tmp/release-notes.md
