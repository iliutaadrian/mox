name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # Apple Silicon only for now. GitHub's Intel (macos-13) runners are being
    # phased out and queue unreliably, and Bun can't cross-link OpenTUI's
    # foreign-platform native dep. An Intel build can be added later on a
    # dedicated runner if there's demand — until then x64 users build from source.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run scripts/build.ts dist/mox-darwin-arm64
      - run: chmod +x dist/mox-darwin-arm64
      - name: Checksums
        run: |
          cd dist
          shasum -a 256 mox-darwin-arm64 > checksums.txt
          cat checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mox-darwin-arm64
            dist/checksums.txt
          generate_release_notes: true
          body: |
            ## Install (Apple Silicon)

            ```bash
            curl -fsSL https://raw.githubusercontent.com/iliutaadrian/mox/main/install.sh | bash
            ```

            Or download `mox-darwin-arm64` below, `chmod +x`, and move it onto your `PATH`.

            > Intel Macs: no prebuilt binary yet — [run from source](https://github.com/iliutaadrian/mox#run-from-source-dev).
