# spark-cli configuration.
# Copy to ./config.yaml (in the project folder) and edit.

# OpenAI model used for classification. Default is gpt-4o-mini, which is cheap
# and ample for this simple, high-volume task. Set gpt-4o for higher accuracy.
model: gpt-4o-mini

# On a cold mailbox, how many recent messages to pull on the first sync.
fetch_limit: 200

accounts:
  - name: Personal
    imap_host: imap.gmail.com
    imap_port: 993
    imap_user: you@gmail.com
    # For Gmail, use an App Password (not your account password).
    imap_pass: "your-app-password"
    mailbox: INBOX
    # SMTP is only needed for the (later) AI reply-draft feature.
    smtp_host: smtp.gmail.com
    smtp_port: 465
    smtp_user: you@gmail.com
    smtp_pass: "your-app-password"
    from: you@gmail.com

  # - name: Work
  #   imap_host: imap.fastmail.com
  #   imap_user: you@work.com
  #   imap_pass: "..."

# The fixed category set. The AI sorts each email into exactly one of these.
# The description is fed to the model to guide its choice. If an email fits
# none of them, the AI proposes a new one (shown under "Suggested" — press p
# to approve it into the set).
#
# A category may also carry a `match` block of sender rules. Matching emails are
# filed there DETERMINISTICALLY, before the AI runs (no token cost). Such a
# category is shown under "Manual" in the sidebar; AI-only ones under "AI". You
# can also create rules from inside the app: select emails (space) and press A.
#   match:
#     domains:   [github.com]          # also matches subdomains (ci.github.com)
#     addresses: [alerts@honeybadger.io]  # exact sender address
categories:
  - name: Alerts
    description: Error, uptime, and incident alerts from monitoring/infra services.
    match:
      domains: [honeybadger.io, opsgenie.com, render.com, digitaldefense.com]
  - name: Finance
    description: Brokerage, banking, crypto, and tax statements and notices.
    match:
      domains:
        [
          interactivebrokers.com,
          ing.ro,
          revolut.com,
          etoro.com,
          binance.com,
          bitgo.com,
          anaf.ro,
        ]
  - name: GitHub
    description: Pull requests, issues, mentions, Actions/CI, Dependabot.
    match:
      domains: [github.com]
  - name: Shopping
    description: Order confirmations, shipping, and delivery from online stores/couriers.
    match:
      domains:
        [
          emag.ro,
          fashiondays.ro,
          vinted.com,
          sameday.ro,
          fancourier.ro,
          bman.ro,
          cloudcart.com,
        ]
  - name: Work
    description: Job, colleagues, clients, anything employment-related.
    match:
      domains: [golfgenius.com, golfgenius.atlassian.net, slack.com]
  - name: Travel
    description: Flights, hotels, and trip bookings.
    match:
      domains: [booking.com, kiwi.com, ryanairemail.com, wizzair.com]
  - name: Notifications
    description: Automated alerts from other services — calendar, security, app notifications.
    match:
      domains: [worldclass.ro, yahoo.com, apple.com]
  - name: Newsletters
    description: Subscriptions, digests, blogs, recurring marketing content.
    match:
      domains: [morningbrew.com, beehiiv.com, expertmind.com]
  - name: Bills
    description: Utility and telecom invoices and payment reminders.
    match:
      domains: [eon-romania.ro, eon.ro, digi.ro]
  - name: Social
    description: Social-network notifications and activity digests.
    match:
      domains: [linkedin.com, strava.com]
  - name: Personal
    description: Real people writing to you directly; friends, family, 1:1 threads.
  - name: Other
    description: Anything that does not clearly fit the categories above — let the AI decide.
