# spark-cli configuration.
# Copy to ./config.yaml (in the project folder) and edit.

# On a cold mailbox, how many recent messages to pull per account. Ignored when
# fetch_since_days is set.
fetch_limit: 200

# When > 0, fetch every message received within this many days instead of using
# fetch_limit (e.g. 730 = last 2 years). Attachment metadata (name/type/size) is
# stored too; the files themselves are not — fetch them on demand.
# fetch_since_days: 730

# Keep message bodies on disk only for mail newer than this many days; older mail
# stores metadata only and its body is fetched from the server on demand when
# opened (keeps the local DB small). 0 disables pruning. Default 90.
content_days: 90

# Categories kept OUT of the INBOX and ALL views (still reachable via their own
# sidebar entry). Use for noisy/muted buckets you never want in the main views.
inbox_exclude: [Alerts, Muted]

accounts:
  - name: Personal
    imap_host: imap.gmail.com
    imap_port: 993
    imap_user: you@gmail.com
    # For Gmail, use an App Password (not your account password).
    imap_pass: "your-app-password"
    mailbox: INBOX
    # SMTP is only needed for a (future) reply-draft feature.
    smtp_host: smtp.gmail.com
    smtp_port: 465
    smtp_user: you@gmail.com
    smtp_pass: "your-app-password"
    from: you@gmail.com

  # - name: Work
  #   imap_host: imap.fastmail.com
  #   imap_user: you@work.com
  #   imap_pass: "..."

# The category set. Mail is filed DETERMINISTICALLY by the first category (in
# this order) whose `match` block claims it. A `match` block supports:
#   domains:   [github.com]              # sender domain, also matches subdomains
#   addresses: [alerts@honeybadger.io]   # exact sender address
#   words:     [invitation, invite]      # case-insensitive substring of the SUBJECT or SENDER NAME
# Order IS precedence — put muted/blocking categories first, then keyword
# categories, then broad domain categories. Every category needs a rule except
# a single catch-all ("Other"); all show under "Manual" in the sidebar. There is
# no AI in the client — categorize the rest externally (e.g. Claude Code).
categories:
  - name: Muted
    description: Muted senders — hidden from every view except Muted (LinkedIn, Honeybadger).
    match:
      domains: [linkedin.com, honeybadger.io, render.com]
  - name: Calendar
    description: Meeting and calendar invitations and responses (subject keywords).
    match:
      words: [invitation, invite]
  - name: Business
    description: Tax authority (ANAF/SPV) and Expert Mind — PFA/business admin.
    match:
      domains: [anaf.ro, expertmind.ro]
      words: [SPV, expert mind]
  - name: Work
    description: Colleagues and internal company mail, Jira, Slack, GitHub.
    match:
      domains: [golfgenius.com, golfgenius.atlassian.net, slack.com, opsgenie.net, github.com]
  - name: Finance
    description: Banking, brokerage, crypto and tax statements and notices.
    match:
      domains: [interactivebrokers.com, ing.ro, revolut.com, etoro.com, binance.com, bitgo.com]
  - name: Bills
    description: Utility and telecom invoices and payment reminders.
    match:
      domains: [eon-romania.ro, eon.ro, digi.ro]
      words: [invoice, bill, receipt]
  - name: Shopping
    description: Orders, shipping and delivery from online stores and couriers.
    match:
      domains: [emag.ro, fashiondays.ro, vinted.ro, sameday.ro, fancourier.ro, bman.ro, cloudcart.com]
  - name: Travel
    description: Flights, hotels and trip bookings.
    match:
      domains: [booking.com, kiwi.com, ryanairemail.com, wizznews.com, wizzair.com]
  - name: Fitness
    description: Gyms, fitness, running and cycling — workouts, activity and memberships.
    match:
      domains: [worldclass.ro, strava.com, garmin.com, komoot.com]
      words: [playtomic]
  - name: Newsletters
    description: Subscriptions, digests, blogs, recurring marketing content.
    match:
      domains: [morningbrew.com, beehiiv.com]
  - name: Notifications
    description: Automated service/account notices not covered above.
    match:
      domains: [cc.yahoo.com, apple.com]
  # The single ruleless category — the manual catch-all (m key).
  - name: Other
    description: Anything that does not match a rule above.
